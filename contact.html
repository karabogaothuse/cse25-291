<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Paradise Adventures Safaris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navbar (copy from about.html) -->

    <!-- Hero - PLACE YOUR CONTACT HERO IMAGE HERE -->
    <header class="hero d-flex align-items-center text-white" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/your-contact-hero.jpg') center/cover no-repeat; min-height: 60vh;">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Get In Touch</h1>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-5">
                    <h4>Contact Information</h4>
                    <p><strong>Kgomotso Gaothuse</strong> – Accounts Director</p>
                    <p><i class="fas fa-phone"></i> +267 71 701 910<br>+267 310 4365</p>
                    <p><i class="fas fa-envelope"></i> k.gaothuse@paradiseadventures.co.bw</p>
                    <p><i class="fas fa-map-marker-alt"></i> P.O. Box 46544, Gaborone, Botswana</p>
                </div>

                <div class="col-lg-7">
                    <form id="contactForm">
                        <div class="row">
                            <div class="col-md-6 mb-3"><input type="text" id="name" class="form-control" placeholder="Full Name" required></div>
                            <div class="col-md-6 mb-3"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
                        </div>
                        <div class="mb-3"><input type="tel" id="phone" class="form-control" placeholder="Phone Number"></div>
                        <div class="mb-3">
                            <select id="service" class="form-select">
                                <option value="">Select Service</option>
                                <option>Mokoro Excursion</option>
                                <option>Bird Viewing</option>
                                <option>Boat Cruise</option>
                                <option>Game Drive</option>
                                <option>Scenic Flight</option>
                                <option>Camping</option>
                            </select>
                        </div>
                        <div class="mb-3"><textarea id="message" class="form-control" rows="5" placeholder="Your Message / Enquiry" required></textarea></div>
                        <button type="submit" class="btn btn-orange btn-lg px-5">Send Enquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (copy from about.html) -->

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
